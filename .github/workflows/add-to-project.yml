name: Add tracked Issues to project board

on:
  issues:
    types: [labeled]

jobs:
  add-to-project:
    if: github.event.label.name == 'tracked'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/add-to-project@v1.0.2
        with:
          project-url: https://github.com/users/bencohendev/projects/1
          github-token: ${{ secrets.WORK_READ_TOKEN }}
